name: Update Fish Data

on:
  schedule:
    - cron: '0 0 * * SUN'  # Runs at 00:00 UTC every Sunday
  workflow_dispatch:        # Allows manual trigger
  
jobs:
  update-fish-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run update script
      run: python generate_fish_json.py
      
    - name: Check for changes
      id: check_changes
      run: |
        git diff --quiet AutoHook/AutoHook/Data/FishData/fish_list.json || echo "changes=true" >> $GITHUB_OUTPUT
        
    - name: Commit and push if changed
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add AutoHook/Data/FishData/fish_list.json
        git commit -m "Update fish_list.json [skip ci]"
        git push